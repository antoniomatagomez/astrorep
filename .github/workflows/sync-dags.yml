name: Sync FMC to DAGs

on:
  push:
    branches: [dagonly_branch]   # branch mapped to Astro deployment
    paths: ['vaultspeed_fmc/FMC/**', 'vaultspeed_fmc/**'] # when FMC-generated files change
  # workflow_dispatch:          # uncomment to allow "Run workflow" from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo (dagonly_branch)
        uses: actions/checkout@v4
        with:
          ref: dagonly_branch
          token: ${{ secrets.PAT_TOKEN }}

      - name: Clean dags/ then copy vaultspeed_fmc/FMC (.py and .json)
        run: |
          mkdir -p dags
          find dags -mindepth 1 -delete
          cp vaultspeed_fmc/FMC/*.py dags/ 2>/dev/null || true
          cp vaultspeed_fmc/FMC/*.json dags/ 2>/dev/null || true

      - name: Ensure a change to commit (avoid Git ignoring identical files)
        run: |
          echo "Synced at $(date -u +%Y-%m-%dT%H:%M:%SZ) - run ${{ github.run_id }}" > dags/.last_sync

      - name: Commit and push dags/
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${PAT_TOKEN}@github.com/${{ github.repository }}.git"
          git add -A dags/
          git diff --staged --quiet || git commit -m "Sync vaultspeed_fmc to dags [automated]"
          git push
